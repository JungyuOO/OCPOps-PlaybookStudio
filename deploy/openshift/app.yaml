apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/part-of: playbookstudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
        app.kubernetes.io/part-of: playbookstudio
    spec:
      serviceAccountName: terminal-broker
      securityContext:
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: app
          image: ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8765
              name: http
            - containerPort: 8770
              name: terminal-ws
          envFrom:
            - configMapRef:
                name: playbookstudio-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: playbookstudio-secret
                  key: POSTGRES_PASSWORD
            - name: OCP_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: playbookstudio-secret
                  key: OCP_API_TOKEN
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: app-storage
              mountPath: /app/storage
            - name: app-artifacts
              mountPath: /app/artifacts
            - name: app-reports
              mountPath: /app/reports
            - name: app-tmp
              mountPath: /app/tmp
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8765
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 8
      volumes:
        - name: app-data
          emptyDir: {}
        - name: app-storage
          persistentVolumeClaim:
            claimName: app-storage
        - name: app-artifacts
          emptyDir: {}
        - name: app-reports
          emptyDir: {}
        - name: app-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/part-of: playbookstudio
spec:
  selector:
    app.kubernetes.io/name: app
  ports:
    - name: http
      port: 8765
      targetPort: 8765
    - name: terminal-ws
      port: 8770
      targetPort: 8770
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: playbookstudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: playbookstudio
    spec:
      serviceAccountName: playbookstudio
      containers:
        - name: web
          image: ghcr.io/jungyuoo/ocpops-playbookstudio-web:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: playbookstudio
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: playbookstudio
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: playbookstudio
spec:
  to:
    kind: Service
    name: web
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
