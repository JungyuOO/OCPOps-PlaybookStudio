apiVersion: batch/v1
kind: Job
metadata:
  name: official-corpus-seed
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: official-corpus-seed
    app.kubernetes.io/component: seed
    app.kubernetes.io/part-of: playbookstudio
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: official-corpus-seed
        app.kubernetes.io/component: seed
        app.kubernetes.io/part-of: playbookstudio
    spec:
      restartPolicy: Never
      serviceAccountName: playbookstudio
      containers:
        - name: official-corpus-seed
          image: ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: playbookstudio-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: playbookstudio-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          command:
            - python
            - -m
            - play_book_studio.cli
            - official-gold-import
            - --root-dir
            - /app
            - --chunks-path
            - /app/corpus/sources/official/imported-gold/gold_corpus_ko/chunks.jsonl
            - --enrich-runtime-metadata
            - --index
            - --index-limit
            - "50000"
            - --refresh-qdrant-payloads
            - --refresh-limit
            - "50000"
