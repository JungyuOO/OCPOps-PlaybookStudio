apiVersion: batch/v1
kind: Job
metadata:
  name: official-corpus-seed
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: official-corpus-seed
    app.kubernetes.io/component: seed
    app.kubernetes.io/part-of: playbookstudio
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: official-corpus-seed
        app.kubernetes.io/component: seed
        app.kubernetes.io/part-of: playbookstudio
    spec:
      restartPolicy: Never
      serviceAccountName: playbookstudio
      containers:
        - name: official-corpus-seed
          image: ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: playbookstudio-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: playbookstudio-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          command:
            - bash
            - -lc
            - >
              python -m play_book_studio.cli official-gold-import
              --root-dir /app
              --index
              --index-limit ${OFFICIAL_CORPUS_INDEX_LIMIT:-50000}
              --enrich-runtime-metadata
              --refresh-qdrant-payloads
              --refresh-limit ${OFFICIAL_CORPUS_REFRESH_LIMIT:-50000}
              --collection ${QDRANT_COLLECTION:-openshift_docs}
              &&
              python -m play_book_studio.cli kmsc-course-import
              --root-dir /app
              --course-dir ${KMSC_COURSE_SOURCE_DIR:-/app/corpus/sources/kmsc/parsed-preview/course_pbs}
              --index
              --collection ${QDRANT_COLLECTION:-openshift_docs}
