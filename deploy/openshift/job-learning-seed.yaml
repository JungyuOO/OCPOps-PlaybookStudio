apiVersion: batch/v1
kind: Job
metadata:
  name: learning-seed
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: learning-seed
    app.kubernetes.io/component: seed
    app.kubernetes.io/part-of: playbookstudio
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learning-seed
        app.kubernetes.io/component: seed
        app.kubernetes.io/part-of: playbookstudio
    spec:
      restartPolicy: Never
      serviceAccountName: playbookstudio
      containers:
        - name: learning-seed
          image: ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: playbookstudio-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: playbookstudio-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          command:
            - python
            - -m
            - play_book_studio.cli
            - learning-seed-import
            - --root-dir
            - /app
            - --guides-path
            - /app/corpus/sources/kmsc/parsed-preview/course_pbs/manifests/ops_learning_guides_v1.json
