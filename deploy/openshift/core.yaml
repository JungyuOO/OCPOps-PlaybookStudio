apiVersion: v1
kind: Namespace
metadata:
  name: pbs-ocpops
  labels:
    app.kubernetes.io/part-of: playbookstudio
    playbookstudio.cywell/display-name: PBS-OCPOps
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: playbookstudio
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/part-of: playbookstudio
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: playbookstudio-config
  namespace: pbs-ocpops
data:
  PLAYBOOKSTUDIO_APP_IMAGE: ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev
  PLAYBOOKSTUDIO_WEB_IMAGE: ghcr.io/jungyuoo/ocpops-playbookstudio-web:dev
  POSTGRES_DB: playbookstudio
  POSTGRES_USER: admin
  EMBEDDING_BASE_URL: http://tei.cywell.co.kr/v1
  EMBEDDING_MODEL: dragonkue/bge-m3-ko
  EMBEDDING_DEVICE: auto
  EMBEDDING_BATCH_SIZE: "32"
  EMBEDDING_TIMEOUT_SECONDS: "8"
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION: openshift_docs
  QDRANT_VECTOR_SIZE: "1024"
  QDRANT_DISTANCE: Cosine
  QDRANT_UPSERT_BATCH_SIZE: "128"
  QDRANT_RECREATE_COLLECTION: "false"
  OFFICIAL_CORPUS_INDEX_LIMIT: "50000"
  OFFICIAL_CORPUS_REFRESH_LIMIT: "50000"
  LLM_ENDPOINT: http://cllm.cywell.co.kr/v1
  LLM_MODEL: Qwen/Qwen3.5-9B
  OCP_API_BASE_URL: https://api.ocp.cywell.local:6443
  OCP_INSECURE_SKIP_TLS_VERIFY: "true"
  OCP_DEFAULT_NAMESPACE: pbs-ocpops
  TERMINAL_ENABLED: "true"
  TERMINAL_HOST: 0.0.0.0
  TERMINAL_WS_PORT: "8770"
  TERMINAL_SHELL: /app/scripts/terminal-entrypoint.sh
  TERMINAL_SESSION_TTL_SECONDS: "1800"
  TERMINAL_MAX_OUTPUT_BYTES: "1048576"
  RERANKER_ENABLED: "true"
  RERANKER_BASE_URL: http://bge-reranker:80
  RERANKER_MODEL: BAAI/bge-reranker-v2-m3
  RERANKER_TOP_N: "12"
  RERANKER_BATCH_SIZE: "8"
  RERANKER_DEVICE: auto
  RERANKER_TIMEOUT_SECONDS: "10"
  ARTIFACTS_DIR: /app/artifacts
  OBJECT_STORAGE_ROOT: /app/storage
  CORPUS_SEED_DIR: /app/corpus
  SOURCE_MANIFEST_PATH: /app/corpus/manifests/official/ocp_ko_4_20_approved_ko.json
  KMSC_COURSE_SOURCE_DIR: /app/corpus/sources/kmsc/parsed-preview/course_pbs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: pbs-ocpops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-storage
  namespace: pbs-ocpops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-storage
  namespace: pbs-ocpops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pbs-ocpops-bge-reranker-cache
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  claimRef:
    namespace: pbs-ocpops
    name: bge-reranker-cache
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - 52-54-00-47-49-49
  hostPath:
    path: /var/lib/playbookstudio-ocp/bge-reranker-cache
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bge-reranker-cache
  namespace: pbs-ocpops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bge-reranker
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: bge-reranker
    app.kubernetes.io/part-of: playbookstudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bge-reranker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bge-reranker
        app.kubernetes.io/part-of: playbookstudio
    spec:
      serviceAccountName: playbookstudio
      containers:
        - name: bge-reranker
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
          imagePullPolicy: IfNotPresent
          args:
            - --model-id
            - BAAI/bge-reranker-v2-m3
          ports:
            - containerPort: 80
              name: http
          env:
            - name: HF_HOME
              value: /data
          volumeMounts:
            - name: bge-reranker-cache
              mountPath: /data
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          startupProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 90
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
      volumes:
        - name: bge-reranker-cache
          persistentVolumeClaim:
            claimName: bge-reranker-cache
---
apiVersion: v1
kind: Service
metadata:
  name: bge-reranker
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: bge-reranker
    app.kubernetes.io/part-of: playbookstudio
spec:
  selector:
    app.kubernetes.io/name: bge-reranker
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: playbookstudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: playbookstudio
    spec:
      serviceAccountName: playbookstudio
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: playbookstudio-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: playbookstudio-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: playbookstudio-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "playbookstudio"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: playbookstudio
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/part-of: playbookstudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qdrant
        app.kubernetes.io/part-of: playbookstudio
    spec:
      serviceAccountName: playbookstudio
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /collections
              port: 6333
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-storage
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: pbs-ocpops
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/part-of: playbookstudio
spec:
  selector:
    app.kubernetes.io/name: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
