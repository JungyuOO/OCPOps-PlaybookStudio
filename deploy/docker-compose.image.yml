name: ocpops-playbookstudio

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playbookstudio}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-admin} -d $${POSTGRES_DB:-playbookstudio}"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "${QDRANT_HTTP_BIND:-127.0.0.1:6335}:6333"
      - "${QDRANT_GRPC_BIND:-127.0.0.1:6336}:6334"
    restart: unless-stopped

  app:
    image: ${PLAYBOOKSTUDIO_APP_IMAGE:-ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev}
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      PYTHONPATH: /app/src
      COURSE_CHAT_LLM_REWRITE: "${COURSE_CHAT_LLM_REWRITE:-true}"
      QDRANT_URL: http://qdrant:6333
      QDRANT_RECREATE_COLLECTION: "false"
      ARTIFACTS_DIR: /app/artifacts
      OBJECT_STORAGE_ROOT: /app/storage
      CORPUS_SEED_DIR: /app/corpus
      SOURCE_MANIFEST_PATH: /app/corpus/manifests/official/ocp_ko_4_20_approved_ko.json
      TERMINAL_HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${DATA_SEED_DIR:-../data}:/app/data:ro
      - app_artifacts:/app/artifacts
      - app_storage:/app/storage
      - app_reports:/app/reports
      - app_tmp:/app/tmp
    ports:
      - "${APP_HTTP_BIND:-127.0.0.1:8765}:8765"
      - "${TERMINAL_WS_BIND:-0.0.0.0:8770}:8770"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    restart: unless-stopped

  db-migrate:
    image: ${PLAYBOOKSTUDIO_APP_IMAGE:-ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev}
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: ${DATABASE_URL:-postgresql://playbookstudio:change-me@postgres:5432/playbookstudio}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "play_book_studio.cli", "db-migrate", "--root-dir", "/app"]
    restart: "no"

  course-runtime-seed:
    profiles:
      - seed
    image: ${PLAYBOOKSTUDIO_APP_IMAGE:-ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev}
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: ${DATABASE_URL:-postgresql://playbookstudio:change-me@postgres:5432/playbookstudio}
      CORPUS_SEED_DIR: /app/corpus
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "play_book_studio.cli", "course-chunk-import", "--root-dir", "/app", "--course-dir", "/app/corpus/sources/kmsc/parsed-preview/course_pbs"]
    restart: "no"

  official-corpus-seed:
    profiles:
      - seed
    image: ${PLAYBOOKSTUDIO_APP_IMAGE:-ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev}
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: ${DATABASE_URL:-postgresql://playbookstudio:change-me@postgres:5432/playbookstudio}
      QDRANT_URL: http://qdrant:6333
      QDRANT_RECREATE_COLLECTION: "false"
      ARTIFACTS_DIR: /app/artifacts
      OBJECT_STORAGE_ROOT: /app/storage
      CORPUS_SEED_DIR: /app/corpus
      SOURCE_MANIFEST_PATH: /app/corpus/manifests/official/ocp_ko_4_20_approved_ko.json
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_artifacts:/app/artifacts
      - app_storage:/app/storage
      - app_reports:/app/reports
      - app_tmp:/app/tmp
    command:
      - bash
      - -lc
      - >
        python -m play_book_studio.cli official-gold-import
        --root-dir /app
        --enrich-runtime-metadata
        --index
        --index-limit ${OFFICIAL_CORPUS_INDEX_LIMIT:-50000}
        --refresh-qdrant-payloads
        --refresh-limit ${OFFICIAL_CORPUS_REFRESH_LIMIT:-50000}
        --collection ${QDRANT_COLLECTION:-openshift_docs}
    restart: "no"

  kmsc-corpus-seed:
    profiles:
      - seed
    image: ${PLAYBOOKSTUDIO_APP_IMAGE:-ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev}
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: ${DATABASE_URL:-postgresql://playbookstudio:change-me@postgres:5432/playbookstudio}
      QDRANT_URL: http://qdrant:6333
      QDRANT_RECREATE_COLLECTION: "false"
      ARTIFACTS_DIR: /app/artifacts
      OBJECT_STORAGE_ROOT: /app/storage
      CORPUS_SEED_DIR: /app/corpus
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_artifacts:/app/artifacts
      - app_storage:/app/storage
      - app_reports:/app/reports
      - app_tmp:/app/tmp
    command: ["python", "-m", "play_book_studio.cli", "kmsc-course-import", "--root-dir", "/app", "--course-dir", "${KMSC_COURSE_SOURCE_DIR:-/app/corpus/sources/kmsc/parsed-preview/course_pbs}", "--index", "--collection", "${QDRANT_COLLECTION:-openshift_docs}"]
    restart: "no"

  qdrant-seed:
    profiles:
      - seed
    image: ${PLAYBOOKSTUDIO_APP_IMAGE:-ghcr.io/jungyuoo/ocpops-playbookstudio-app:dev}
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      PYTHONPATH: /app/src
      QDRANT_URL: http://qdrant:6333
      QDRANT_RECREATE_COLLECTION: "false"
      ARTIFACTS_DIR: /app/artifacts
      OBJECT_STORAGE_ROOT: /app/storage
      CORPUS_SEED_DIR: /app/corpus
      SOURCE_MANIFEST_PATH: /app/corpus/manifests/official/ocp_ko_4_20_approved_ko.json
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - app_artifacts:/app/artifacts
      - app_storage:/app/storage
      - app_reports:/app/reports
      - app_tmp:/app/tmp
    command: ["python", "-m", "play_book_studio.cli", "course-qdrant-upsert", "--root-dir", "/app", "--course-dir", "corpus/sources/kmsc/parsed-preview/course_pbs"]
    restart: "no"

  web:
    image: ${PLAYBOOKSTUDIO_WEB_IMAGE:-ghcr.io/jungyuoo/ocpops-playbookstudio-web:dev}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${WEB_BIND:-0.0.0.0:8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-ocpops_playbookstudio_postgres_data}
  qdrant_storage:
    name: ${QDRANT_VOLUME_NAME:-ocp-rag-chatbot_qdrant_storage}
  app_artifacts:
  app_storage:
  app_reports:
  app_tmp:
