name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: true
        default: dev
  push:
    branches:
      - dev
    paths:
      - .github/workflows/publish-images.yml
      - deploy/Dockerfile
      - deploy/docker-compose.image.yml
      - deploy/nginx/**
      - deploy/scripts/**
      - apps/web/**
      - corpus/**
      - db/**
      - src/**
      - pyproject.toml
      - README.md

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: app
            image_name: ocpops-playbookstudio-app
          - target: web
            image_name: ocpops-playbookstudio-web
          - target: sandbox
            image_name: ocpops-playbookstudio-sandbox
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          requested_tag="${{ github.event.inputs.tag || 'dev' }}"
          sha_tag="sha-${GITHUB_SHA::12}"
          echo "image=${REGISTRY}/${owner}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"
          echo "requested_tag=${requested_tag}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.requested_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
