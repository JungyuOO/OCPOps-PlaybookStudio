name: ocpops-playbookstudio

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playbookstudio}
      POSTGRES_USER: ${POSTGRES_USER:-playbookstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    ports:
      - "6335:6333"
      - "6336:6334"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      COURSE_CHAT_LLM_REWRITE: "true"
      DATABASE_URL: ${DATABASE_URL:-postgresql://playbookstudio:change-me@postgres:5432/playbookstudio}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/app/src
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./manifests:/app/manifests
      - ./reports:/app/reports
      - ./tmp:/app/tmp
      - ./tmp_source:/app/tmp_source
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: ${DATABASE_URL:-postgresql://playbookstudio:change-me@postgres:5432/playbookstudio}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "play_book_studio.cli", "db-migrate", "--root-dir", "/app"]
    restart: "no"

  qdrant-seed:
    profiles:
      - seed
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      QDRANT_URL: http://qdrant:6333
      QDRANT_RECREATE_COLLECTION: "false"
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/app/src
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./manifests:/app/manifests
      - ./reports:/app/reports
      - ./tmp:/app/tmp
    command: ["python", "-m", "play_book_studio.cli", "course-qdrant-upsert", "--root-dir", "/app", "--course-dir", "data/course_pbs"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_storage:
    name: ${POSTGRES_VOLUME_NAME:-ocp-rag-chatbot_postgres_storage}
  qdrant_storage:
    name: ${QDRANT_VOLUME_NAME:-ocp-rag-chatbot_qdrant_storage}
